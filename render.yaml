services:
  - type: web
    name: api-jwt-refresh-pro
    runtime: node
    plan: free
    buildCommand: npm install && npm run prisma:generate
    preDeployCommand: npm run migrate:deploy
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: NODE_ENV
        value: production
      - key: JWT_EXPIRA_EM
        value: 15m
      - key: REFRESH_EXPIRA_DIAS
        value: 7
      - key: COOKIE_SAMESITE
        value: lax
      - key: RATE_LIMIT_AUTH_MAX
        value: 20
      - key: DATABASE_URL
        sync: false
      - key: JWT_ACCESS_SECRET
        sync: false
      - key: CORS_ORIGIN
        sync: false
